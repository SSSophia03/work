            height: 18px;

            {code:"1030106",name:"待分配组",level:3,parentCode:"10301"}
        ];

        function buildTree(data, parentCode) {
            const children = data.filter(d => d.parentCode === parentCode);
            if (children.length === 0) return null;
            return children.map(child => ({
                ...child,
                children: buildTree(data, child.code)
            }));
        }

        function renderTree(nodes, container) {
            if (!nodes || nodes.length === 0) return;
            const ul = document.createElement('ul');
            nodes.forEach(node => {
                const li = document.createElement('li');
                const div = document.createElement('div');
                div.className = `node level-${node.level}`;
                if (node.level === 0) div.classList.add('root');
                div.innerHTML = `${node.name}<span class="dept-code">${node.code}</span>`;
                if (node.children && node.children.length > 0) {
                    div.classList.add('has-children');
                    div.addEventListener('click', function(e) {
                        e.stopPropagation();
                        div.classList.toggle('collapsed');
                        const subUl = li.querySelector('ul');
                        if (subUl) subUl.style.display = div.classList.contains('collapsed') ? 'none' : 'flex';
                    });
                }
                li.appendChild(div);
                if (node.children && node.children.length > 0) {
                    renderTree(node.children, li);
                }
                ul.appendChild(li);
            });
            container.appendChild(ul);
        }

        const treeData = buildTree(deptData, "");
        const treeRoot = document.getElementById('tree-root');
        renderTree(treeData, treeRoot);

        let scale = 0.6;
        let panning = false;
        let pointX = 0;
        let pointY = 0;
        let startX = 0;
        let startY = 0;
        const wrapper = document.getElementById('tree-wrapper');
        const container = document.getElementById('container');

        function updateTransform() {
            wrapper.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }

        function zoomIn() {
            scale = Math.min(scale * 1.2, 3);
            updateTransform();
        }

        function zoomOut() {
            scale = Math.max(scale / 1.2, 0.2);
            updateTransform();
        }

        function resetView() {
            scale = 0.6;
            pointX = 0;
            pointY = 0;
            updateTransform();
        }

        function expandAll() {
            document.querySelectorAll('.node.collapsed').forEach(n => {
                n.classList.remove('collapsed');
                const ul = n.parentElement.querySelector('ul');
                if (ul) ul.style.display = 'flex';
            });
        }

        function collapseAll() {
            document.querySelectorAll('.node.has-children').forEach(n => {
                if (!n.classList.contains('root')) {
                    n.classList.add('collapsed');
                    const ul = n.parentElement.querySelector('ul');
                    if (ul) ul.style.display = 'none';
                }
            });
        }

        container.addEventListener('mousedown', (e) => {
            if (e.target.closest('.node')) return;
            panning = true;
            startX = e.clientX - pointX;
            startY = e.clientY - pointY;
            container.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!panning) return;
            e.preventDefault();
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            panning = false;
            container.style.cursor = 'grab';
        });

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.max(0.2, Math.min(3, scale * delta));
            updateTransform();
        });

        const treeRect = wrapper.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        pointX = (containerRect.width - treeRect.width * scale) / 2;
        pointY = 20;
        updateTransform();
    </script>
</body>
</html>
